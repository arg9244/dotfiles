# === General ===
dir=/media/D/Downloads
input-file=/home/reza/.config/aria2/aria2.session
save-session=/home/reza/.config/aria2/aria2.session
save-session-interval=1
auto-save-interval=1
log=/home/reza/.config/aria2/aria2.log
log-level=warn
max-concurrent-downloads=1
continue=true
check-integrity=true
max-tries=0
retry-wait=5
connect-timeout=60
auto-file-renaming=false
lowest-speed-limit=10K

# === Split / Connections ===
max-connection-per-server=16
min-split-size=5M
split=16
max-overall-download-limit=0

# === Torrent ===
seed-ratio=0
seed-time=0
bt-max-peers=128
detach-share-only=false
bt-save-metadata=true
bt-load-saved-metadata=true
bt-remove-unselected-file=true
bt-force-encryption=true
bt-stop-timeout=120

# === RPC (localhost only — safe to push to public repo) ===
enable-rpc=true
rpc-listen-all=false
rpc-listen-address=127.0.0.1
rpc-listen-port=6800

# === HTTP/FTP ===
http-accept-gzip=true
content-disposition-default-utf8=true

# === Disk (NTFS via fuseblk) ===
file-allocation=none
disk-cache=128M
no-file-allocation-limit=10M
